name: Container release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: container-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    uses: berntpopp/genefoundry-router/.github/workflows/_container-release.yml@2e27a1b519aeb9aa32324295dccbe37e6309bdd9
