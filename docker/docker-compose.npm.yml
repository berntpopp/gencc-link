# Nginx Proxy Manager deployment overlay for gencc-link.
#
# Self-contained (used standalone, not layered on docker-compose.yml): one
# unified container serves the FastAPI REST API on / and the MCP streamable-HTTP
# transport on /mcp via a single port (8000). NPM reverse-proxies to the fixed
# container_name on the shared external npm_default network. Mirrors the
# gtex-link / clingen-link pattern.
#
#   docker compose -f docker/docker-compose.npm.yml --env-file .env.docker up -d --build
name: gencc-link-npm

services:
  gencc_link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: gencc-link-npm
    # NO published host ports - NPM handles all routing via the container name.
    expose:
      - "8000"
    environment:
      - GENCC_LINK_HOST=0.0.0.0
      - GENCC_LINK_PORT=8000
      - GENCC_LINK_TRANSPORT=unified
      - GENCC_LINK_MCP_PATH=/mcp
      - GENCC_LINK_LOG_LEVEL=${LOG_LEVEL_API:-INFO}
      - GENCC_LINK_LOG_FORMAT=json
      - GENCC_LINK_RELOAD=false
      # Data lifecycle: the entrypoint builds the ~24MB SQLite DB once on first
      # boot (AUTO_BOOTSTRAP as a lazy fallback) and the in-app scheduler
      # conditionally refreshes it every 24h (304 = no-op). The named volume
      # keeps the DB across restarts.
      - GENCC_LINK_DATA__DATA_DIR=/app/data
      - GENCC_LINK_DATA__AUTO_BOOTSTRAP=true
      - GENCC_LINK_DATA__REFRESH_ENABLED=true
      - GENCC_LINK_DATA__REFRESH_INTERVAL_HOURS=24
      - GENCC_LINK_DATA__CACHE_SIZE=${GENCC_CACHE_SIZE:-2000}
      - GENCC_LINK_DATA__CACHE_TTL=${GENCC_CACHE_TTL:-7200}
    # env_file provided via the --env-file flag for consistency with siblings.
    command: ["python", "server.py", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      # First boot downloads + builds the GenCC database before serving.
      start_period: 180s
    restart: unless-stopped
    read_only: true
    tmpfs:
      # TMPDIR=/tmp/gencc-link (set in the image) - download/build scratch space.
      - /tmp/gencc-link:rw,noexec,nosuid,size=256m,mode=1777
    volumes:
      # Persist the built ~24MB SQLite database across container restarts.
      - gencc-data:/app/data
    networks:
      - gencc_link_internal_net
      - npm_proxy_network
    deploy:
      resources:
        limits:
          memory: ${GENCC_API_MEMORY_LIMIT:-1g}
          cpus: ${GENCC_API_CPU_LIMIT:-1.0}
          pids: 256
        reservations:
          memory: 256m
          cpus: 0.25
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=gencc-link,environment=production,proxy=npm"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true

volumes:
  gencc-data:
    driver: local

networks:
  gencc_link_internal_net:
    driver: bridge
    name: gencc_link_internal_net
  npm_proxy_network:
    external: true
    name: ${NPM_SHARED_NETWORK_NAME:-npm_default}
