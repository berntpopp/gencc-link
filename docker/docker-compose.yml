name: gencc-link

services:
  gencc-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0}
        VCS_REF: ${VCS_REF:-0000000000000000000000000000000000000000}
        BUILD_DATE: ${BUILD_DATE:-1970-01-01T00:00:00Z}
    container_name: gencc-link
    # Dev/local only — loopback-bound (127.0.0.1) so copying this file to a
    # server never publishes the unauthenticated backend on the public IP
    # (Docker would otherwise bind 0.0.0.0 and bypass the host firewall).
    # Production fronts the container with a reverse proxy via the prod/npm
    # overlays (ports: !reset []). Backends are unauthenticated by design.
    ports:
      - "127.0.0.1:${GENCC_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      GENCC_LINK_HOST: 0.0.0.0
      GENCC_LINK_PORT: 8000
      GENCC_LINK_TRANSPORT: unified
      GENCC_LINK_MCP_PATH: /mcp
      GENCC_LINK_LOG_LEVEL: INFO
      GENCC_LINK_LOG_FORMAT: json
      # Data lifecycle (see docs/data-lifecycle.md):
      #   - the entrypoint builds the database ONCE on startup before serving
      #   - the in-app scheduler conditionally refreshes it every 24h and
      #     hot-reloads it on change
      # The named volume below keeps the ~24MB database across restarts so a
      # restart re-uses it (the entrypoint's conditional request returns 304).
      GENCC_LINK_DATA__DATA_DIR: /data
      GENCC_LINK_DATA__AUTO_BOOTSTRAP: "false"
      GENCC_LINK_DATA__REFRESH_ENABLED: "true"
      GENCC_LINK_DATA__REFRESH_INTERVAL_HOURS: "24"
    volumes:
      # Persist the built ~24MB SQLite database across container restarts.
      - gencc-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # First boot builds the database in the entrypoint before serving; allow
      # time for the initial download + build.
      start_period: 150s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - gencc-network

volumes:
  gencc-data:
    driver: local

networks:
  gencc-network:
    driver: bridge
